name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: facegate_test
          POSTGRES_USER: facegate
          POSTGRES_PASSWORD: facegate_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U facegate
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
        env:
          DATABASE_URL: "postgresql://facegate:facegate_pass@localhost:5432/facegate_test?schema=public"

      - run: bunx prisma db push
        env:
          DATABASE_URL: "postgresql://facegate:facegate_pass@localhost:5432/facegate_test?schema=public"

      - run: bun run src/seed.ts
        env:
          DATABASE_URL: "postgresql://facegate:facegate_pass@localhost:5432/facegate_test?schema=public"

      - run: bun run src/index.ts &
      - name: Health check
        run: sleep 3 && curl -s http://localhost:8150/api/health | grep -q '"status":"ok"'

  android:
    name: Android Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build :core
        run: ./gradlew :core:assembleDebug

      - name: Build :kiosk-scanner
        run: ./gradlew :kiosk-scanner:assembleDebug

      - name: Build :admin-app
        run: ./gradlew :admin-app:assembleDebug

      - name: Upload Kiosk APK
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-scanner-apk
          path: android/kiosk-scanner/build/outputs/apk/debug/*.apk

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-apk
          path: android/admin-app/build/outputs/apk/debug/*.apk
